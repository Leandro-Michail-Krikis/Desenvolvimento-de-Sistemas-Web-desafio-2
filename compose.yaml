services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: desafio2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d desafio2"]
      interval: 10s
      timeout: 5s
      retries: 5

